name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

# 用 concurrency 防止并发部署互相覆盖（极端罕见 —— 合并速度比部署慢 —— 但便宜）
concurrency:
  group: pages-deploy
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=aglet-registry --branch=main --commit-hash=${{ github.sha }} --commit-dirty=false
